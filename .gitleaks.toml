title = "E-Office verified fixture allowlist"

[extend]
useDefault = true

[[allowlists]]
description = "CI-only JWT value is a non-deployable test fixture"
condition = "AND"
regexTarget = "secret"
regexes = [ '''^ci-jwt-secret-at-least-32-chars-long$''' ]
paths = [ '''^\.github/workflows/ci\.yml$''' ]

[[allowlists]]
description = "Documentation uses explicit non-secret access-token placeholders"
condition = "AND"
regexTarget = "secret"
regexes = [ '''^YOUR_TOKEN$''', '''^YOUR_ACCESS_TOKEN$''', '''^eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.\.\.$''' ]
paths = [ '''^docs/(SUPER-ADMIN-GUIDE|email-setup|testing-guide|SAAS-ONBOARDING-API)\.md$''' ]
