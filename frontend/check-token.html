<!DOCTYPE html>
<html>
<head>
    <title>Check Token</title>
</head>
<body>
    <h1>Check Authentication Token</h1>
    <button onclick="checkToken()">Check Token</button>
    <pre id="result"></pre>

    <script>
        function checkToken() {
            const authData = localStorage.getItem('esign.auth');
            const result = document.getElementById('result');
            
            if (!authData) {
                result.textContent = '❌ No auth data found!\nPlease login again.';
                return;
            }

            try {
                const parsed = JSON.parse(authData);
                result.textContent = JSON.stringify(parsed, null, 2);
                
                // Check if token exists
                if (parsed.tokens && parsed.tokens.accessToken) {
                    console.log('✅ Token exists');
                    
                    // Decode JWT to check expiry
                    const token = parsed.tokens.accessToken;
                    const parts = token.split('.');
                    if (parts.length === 3) {
                        const payload = JSON.parse(atob(parts[1]));
                        const exp = new Date(payload.exp * 1000);
                        const now = new Date();
                        
                        result.textContent += '\n\n📅 Token Expiry: ' + exp.toLocaleString();
                        result.textContent += '\n⏰ Current Time: ' + now.toLocaleString();
                        
                        if (now > exp) {
                            result.textContent += '\n\n❌ TOKEN EXPIRED! Please login again.';
                        } else {
                            result.textContent += '\n\n✅ Token is valid';
                        }
                    }
                } else {
                    result.textContent += '\n\n❌ No access token found!';
                }
            } catch (error) {
                result.textContent = '❌ Error parsing auth data: ' + error.message;
            }
        }
    </script>
</body>
</html>
