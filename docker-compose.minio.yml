# Optional self-hosted MinIO overlay.
#
# Start with:
# docker compose -f docker-compose.yml -f docker-compose.minio.yml up -d --build
services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    expose:
      - "9000"
    ports:
      - "${MINIO_CONSOLE_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ "$$MINIO_ROOT_USER" = "$$S3_ACCESS_KEY_ID" ]; then
          echo "MINIO_ROOT_USER and S3_ACCESS_KEY_ID must be different" >&2
          exit 1
        fi
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        cat >/tmp/eoffice-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetBucketLocation", "s3:ListBucket"],
              "Resource": ["arn:aws:s3:::$$S3_BUCKET"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
              "Resource": ["arn:aws:s3:::$$S3_BUCKET/*"]
            }
          ]
        }
        EOF
        mc admin policy create local eoffice-policy /tmp/eoffice-policy.json || true
        mc admin user add local "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY" || true
        mc admin policy attach local eoffice-policy --user "$$S3_ACCESS_KEY_ID"
    restart: "no"

  backend:
    depends_on:
      minio-init:
        condition: service_completed_successfully

  outbox-worker:
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
