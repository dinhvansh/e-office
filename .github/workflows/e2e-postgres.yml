name: Docker Storage E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  workflow-e2e:
    name: Workflow E2E (${{ matrix.storage }})
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - storage: local
            command: e2e:docker
            project: eoffice-e2e
            env_file: .env.test.example
            compose_files: -f docker-compose.yml -f docker-compose.test.yml
          - storage: s3-minio
            command: e2e:s3
            project: eoffice-e2e-s3
            env_file: .env.s3.test.example
            compose_files: -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.s3.test.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Docker Compose
        run: docker compose version

      - name: Run the shared Docker PostgreSQL E2E helper
        env:
          # Keep containers only long enough for the failure diagnostics below.
          E2E_KEEP_CONTAINERS: "1"
        run: npm run ${{ matrix.command }}

      - name: Show Compose diagnostics on failure
        if: failure()
        run: |
          docker compose --project-name ${{ matrix.project }} --env-file ${{ matrix.env_file }} ${{ matrix.compose_files }} ps || true
          docker compose --project-name ${{ matrix.project }} --env-file ${{ matrix.env_file }} ${{ matrix.compose_files }} logs --no-color || true

      - name: Clean up Docker E2E stack
        if: always()
        run: docker compose --project-name ${{ matrix.project }} --env-file ${{ matrix.env_file }} ${{ matrix.compose_files }} down --volumes --remove-orphans
