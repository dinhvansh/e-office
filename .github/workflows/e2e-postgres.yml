name: PostgreSQL E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-e2e:
    name: Workflow E2E (Docker Compose)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Docker Compose
        run: docker compose version

      - name: Run the shared Docker PostgreSQL E2E helper
        env:
          # Keep containers only long enough for the failure diagnostics below.
          E2E_KEEP_CONTAINERS: "1"
        run: npm run e2e:docker

      - name: Show Compose diagnostics on failure
        if: failure()
        run: |
          docker compose --project-name eoffice-e2e --env-file .env.test.example -f docker-compose.yml -f docker-compose.test.yml ps || true
          docker compose --project-name eoffice-e2e --env-file .env.test.example -f docker-compose.yml -f docker-compose.test.yml logs --no-color || true

      - name: Clean up Docker E2E stack
        if: always()
        run: docker compose --project-name eoffice-e2e --env-file .env.test.example -f docker-compose.yml -f docker-compose.test.yml down --volumes --remove-orphans
