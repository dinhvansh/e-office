name: Installation Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-install:
    name: Demo install, login, backup, and restore
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Compose
        run: docker compose version

      - name: Validate shell scripts
        run: bash -n install.sh deploy.sh scripts/backup.sh scripts/restore.sh scripts/smoke-install.sh

      - name: Run canonical installation smoke test
        env:
          INSTALL_SMOKE_KEEP_CONTAINERS: "true"
        run: ./scripts/smoke-install.sh

      - name: Show diagnostics on failure
        if: failure()
        run: |
          docker compose --env-file .env ps || true
          docker compose --env-file .env logs --no-color --tail=300 || true

      - name: Clean up
        if: always()
        run: |
          if [ -f .env ]; then
            docker compose --env-file .env down --volumes --remove-orphans || true
          fi
