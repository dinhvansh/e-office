services:
  db:
    image: postgres:16
    container_name: eoffice-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eoffice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      POSTGRES_DB: ${POSTGRES_DB:-eoffice_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eoffice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eoffice-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  license-server:
    build: ./license-server
    container_name: eoffice-license
    environment:
      PORT: 5000
      LICENSE_SIGNING_SECRET: ${LICENSE_SIGNING_SECRET:-replace-me-license-secret}
      NODE_ENV: production
    ports:
      - "${LICENSE_SERVER_PORT:-5000}:5000"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: eoffice-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eoffice:change-me-db-password@db:5432/eoffice_db}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-replace-me-jwt-secret-with-32-chars-minimum}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-replace-me-refresh-secret-with-32-chars-minimum}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-http://license-server:5000/api/v1}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-local}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-./storage}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-E-Office}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      license-server:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    container_name: eoffice-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
