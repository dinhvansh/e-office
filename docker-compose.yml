services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eoffice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-eoffice_db}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eoffice} -d ${POSTGRES_DB:-eoffice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  license-server:
    build: ./license-server
    profiles: ["license"]
    environment:
      PORT: 5000
      LICENSE_SIGNING_SECRET: ${LICENSE_SIGNING_SECRET:-}
      NODE_ENV: production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && node scripts/init-db.js && exec node dist/server.js"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-esign_rt}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-./storage}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PDF_UNICODE_FONT_PATH: ${PDF_UNICODE_FONT_PATH:-/usr/share/fonts/truetype/noto/NotoSans-Regular.ttf}
      PDF_UNICODE_BOLD_FONT_PATH: ${PDF_UNICODE_BOLD_FONT_PATH:-/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-E-Office}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-}
      DISABLE_LICENSE_CHECK: ${DISABLE_LICENSE_CHECK:-true}
      RATE_LIMIT_BYPASS_EMAILS: ${RATE_LIMIT_BYPASS_EMAILS:-}
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:${BACKEND_PORT:-4000}:4000"
    volumes:
      - backend_storage:/app/storage
      - backend_backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  outbox-worker:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && exec node dist/workers/outbox.worker.js"
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-esign_rt}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-./storage}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PDF_UNICODE_FONT_PATH: ${PDF_UNICODE_FONT_PATH:-/usr/share/fonts/truetype/noto/NotoSans-Regular.ttf}
      PDF_UNICODE_BOLD_FONT_PATH: ${PDF_UNICODE_BOLD_FONT_PATH:-/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-2000}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      NODE_ENV: production
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  backend_storage:
  backend_backups:
