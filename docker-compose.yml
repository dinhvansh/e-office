version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: esign
      POSTGRES_PASSWORD: esignpass
      POSTGRES_DB: esign
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: npm run dev
    environment:
      DATABASE_URL: postgres://esign:esignpass@db:5432/esign
      PORT: 4000
      JWT_SECRET: supersecretjwt
      REFRESH_TOKEN_SECRET: supersecretrefresh
      REDIS_URL: redis://redis:6379
      LICENSE_SERVER_URL: http://license-server:5000/api/v1
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis
      - license-server

  frontend:
    build: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  license-server:
    build: ./license-server
    command: npm run dev
    environment:
      PORT: 5000
      LICENSE_SIGNING_SECRET: changeme-license-secret
    ports:
      - "5000:5000"

volumes:
  db_data:
