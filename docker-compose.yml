version: "3.9"

services:
  db:
    image: postgres:16
    container_name: eoffice-db
    environment:
      POSTGRES_USER: esign
      POSTGRES_PASSWORD: esignpass
      POSTGRES_DB: esign
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esign"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eoffice-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  license-server:
    build: ./license-server
    container_name: eoffice-license
    environment:
      PORT: 5000
      LICENSE_SIGNING_SECRET: changeme-license-secret
    ports:
      - "5000:5000"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: eoffice-backend
    environment:
      DATABASE_URL: postgres://esign:esignpass@db:5432/esign
      PORT: 4000
      JWT_SECRET: supersecretjwt-change-this-in-production-min-32-chars
      REFRESH_TOKEN_SECRET: supersecretrefresh-change-this-in-production-min-32-chars
      REDIS_URL: redis://redis:6379
      LICENSE_SERVER_URL: http://license-server:5000/api/v1
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      license-server:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: eoffice-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
