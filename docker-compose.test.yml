# Test-only overlay. Always invoke with --env-file .env.test (or the helper).
services:
  mailpit:
    image: axllent/mailpit:v1.22.3
    ports:
      - "8025:8025"
    restart: "no"
  db:
    restart: "no"
  redis:
    restart: "no"
  backend:
    environment:
      NODE_ENV: test
      AUTO_INIT_DB: "true"
    restart: "no"
  outbox-worker:
    environment:
      NODE_ENV: test
    healthcheck:
      disable: true
    restart: "no"
