# Test-only overlay. Always invoke with --env-file .env.test (or the helper).
services:
  db:
    restart: "no"
  redis:
    restart: "no"
  backend:
    environment:
      NODE_ENV: test
      AUTO_INIT_DB: "true"
    restart: "no"
  outbox-worker:
    environment:
      NODE_ENV: test
    healthcheck:
      disable: true
    restart: "no"
