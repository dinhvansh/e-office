services:
  backend:
    networks:
      default:
      reverse_proxy:
        aliases:
          - eoffice-backend

  frontend:
    networks:
      default:
      reverse_proxy:
        aliases:
          - eoffice-frontend

networks:
  reverse_proxy:
    external: true
    name: ${PROXY_NETWORK_NAME:?PROXY_NETWORK_NAME is required}
